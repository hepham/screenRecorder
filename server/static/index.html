<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Screen Recorder Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Remote Screen Recorder</h1>
        <div class="connection-status" id="ws-status">Connecting...</div>
    </header>

    <main>
        <!-- Execution Configuration Panel -->
        <section class="panel" style="display: flex; align-items: center; gap: 15px; margin-bottom: 2rem; padding: 1rem 1.5rem;">
            <label for="executor-name" style="font-weight: bold; margin: 0;">Executed By: </label>
            <input type="text" id="executor-name" placeholder="Your Name" value="Auto" required style="width: 300px; margin: 0;">
            <!-- Hidden global runner status for backwards compatibility in JS -->
            <div class="runner-status" id="runner-status" style="display: none;"></div>
            <!-- Global agent select is hidden but kept for JS compat during Phase 1 -->
            <select id="agent-select" style="display: none;">
                <option value="auto">Auto-assign (Idle Agent)</option>
            </select>
        </section>

        <div class="top-row">
            <div class="column left-col">
                <!-- Device Management Panel -->
                <section class="panel" id="device-panel">
                    <h2>Connected PC Agents</h2>
                    <div class="device-list" id="device-list">
                        <!-- Devices will be populated here -->
                    </div>
                </section>
            </div>

            <div class="column right-col">
                <!-- Test Cases Panel (Modified to Test Creation) -->
                <section class="panel" id="test-creation-panel">
                    <h2>Test Creation</h2>
                    <button id="open-test-modal-btn">Tạo testcase</button>
                    
                    <hr style="border-color: var(--border-color); margin: 15px 0;">

                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3>Create Test Suite</h3>
                    </div>
                    
                    <div id="drop-zone" class="drop-zone" style="margin-bottom: 10px;">
                        <p>1. Drag & drop Excel mapping file here</p>
                        <input type="file" id="excel-file" accept=".xlsx,.csv" style="display: none;">
                    </div>
                    <div id="zip-drop-zone" class="drop-zone">
                        <p>2. Drag & drop ZIP file (Audio files) here</p>
                        <input type="file" id="zip-file" accept=".zip" style="display: none;">
                    </div>
                    <div id="upload-status" style="margin-top: 10px; font-size: 0.9rem;"></div>
                    
                    <!-- Preview Table Container -->
                    <div id="import-preview-container" style="display: none; margin-top: 15px; border: 1px solid var(--accent-color); padding: 10px; border-radius: 4px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h3 style="margin: 0; font-size: 1rem;">Import Preview</h3>
                            <button type="button" id="cancel-import-btn" style="background-color: var(--border-color); padding: 0.2rem 0.5rem;">Cancel</button>
                        </div>
                        <div id="import-errors" style="color: var(--error); margin-bottom: 10px; font-size: 0.85rem; white-space: pre-wrap;"></div>
                        <div style="max-height: 200px; overflow-y: auto; background: var(--bg-color); border-radius: 4px; margin-bottom: 10px;">
                            <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem;" id="preview-table">
                                <thead style="position: sticky; top: 0; background: var(--panel-bg);">
                                    <tr style="border-bottom: 1px solid #444; text-align: left;">
                                        <th style="padding: 5px;">Suite Name</th>
                                        <th style="padding: 5px;">Cases</th>
                                        <th style="padding: 5px;">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="preview-table-body">
                                </tbody>
                            </table>
                        </div>
                        <button type="button" id="confirm-import-btn" disabled style="width: 100%;">Confirm & Save</button>
                    </div>
                </section>
            </div>
        </div>

        <div class="bottom-section">
            <section class="panel" id="combined-list-panel">
                <h2>Test Suites & Test Cases</h2>
                <div class="combined-list" id="combined-list">
                    <!-- Items will be populated here -->
                </div>
            </section>
        </div>

        <!-- Modal for Test Creation -->
        <div id="test-modal" class="modal">
            <div class="modal-content panel">
                <span class="close-btn">&times;</span>
                <h2>Create Test Case</h2>
                <form id="add-test-form">
                    <input type="text" id="test-name" placeholder="Test Name" required style="margin-bottom: 10px;">
                    <textarea id="test-utterance" placeholder="Utterance" required style="width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 10px;"></textarea>
                    
                    <div id="audio-drop-zone" class="drop-zone" style="margin-bottom: 10px; padding: 20px;">
                        <p>Drag & drop Audio file here</p>
                        <p id="audio-file-name" style="color: var(--accent-color); font-weight: bold;"></p>
                        <input type="file" id="test-audio-file" accept="audio/*" style="display: none;">
                    </div>

                    <input type="text" id="test-desc" placeholder="Description (optional)" style="margin-bottom: 10px;">
                    <button type="submit" style="margin-top: 10px; width: 100%;">Add Test</button>
                </form>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
