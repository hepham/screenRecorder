<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Verification - Remote Screen Recorder</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 0;
            max-width: 100%;
        }
        .sidebar {
            width: 300px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            background-color: #1a1a1a;
        }
        .test-case-item {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }
        .test-case-item:hover {
            background-color: #2a2a2a;
        }
        .test-case-item.active {
            background-color: #333;
            border-left: 4px solid var(--accent-color);
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-pending { background-color: #f39c12; }
        .status-verified { background-color: #27ae60; }
        .status-failed { background-color: #c0392b; }
        .status-norun { background-color: #7f8c8d; }

        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .media-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .video-wrapper {
            flex: 2;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }
        .video-wrapper video {
            max-width: 100%;
            max-height: 500px;
        }
        .info-wrapper {
            flex: 1;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .validation-controls {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
        }
        .toggle-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 15px;
        }
        .toggle-group label {
            width: 120px;
            font-weight: bold;
        }
        .toggle-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-color);
            cursor: pointer;
            border-radius: 4px;
        }
        .toggle-btn.pass.active {
            background-color: var(--success);
            border-color: var(--success);
        }
        .toggle-btn.fail.active {
            background-color: var(--error);
            border-color: var(--error);
        }
        textarea.reason-input {
            width: 100%;
            min-height: 80px;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            font-family: inherit;
            margin-top: 10px;
        }
        #empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #aaa;
            font-size: 1.2rem;
        }
        #verification-area {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="/" style="color: var(--accent-color); text-decoration: none;">&larr; Back to Dashboard</a>
            <h1 style="margin: 0;">Test Verification</h1>
        </div>
        <div id="suite-title" style="font-weight: bold;">Loading Suite...</div>
    </header>

    <main>
        <div class="sidebar" id="test-sidebar">
            <div class="sidebar-header">
                <h3 style="margin: 0;">Test Cases</h3>
            </div>
            <div id="test-case-list">
                <!-- Populated via JS -->
            </div>
        </div>

        <div class="main-content">
            <div id="empty-state">
                Select a test case from the sidebar to begin verification.
            </div>

            <div id="verification-area">
                <h2 id="current-test-title" style="margin-top: 0;">Test Case Name</h2>
                
                <div class="media-container">
                    <div class="video-wrapper">
                        <video id="test-video" controls></video>
                    </div>
                    <div class="info-wrapper">
                        <div>
                            <strong>Expected Utterance:</strong>
                            <p id="test-utterance" style="margin-top: 5px; font-size: 1.1rem; color: var(--accent-color);"></p>
                        </div>
                        <div>
                            <strong>Test Audio:</strong>
                            <audio id="test-audio" controls style="width: 100%; margin-top: 5px;"></audio>
                        </div>
                        <div id="run-info" style="font-size: 0.9rem; color: #aaa;">
                            <!-- Run timestamp and info -->
                        </div>
                    </div>
                </div>

                <div class="validation-controls">
                    <h3 style="margin-top: 0;">Validation</h3>
                    
                    <div class="toggle-group" data-field="pass_lng">
                        <label>LNG (Language):</label>
                        <button class="toggle-btn pass" data-val="true">Pass</button>
                        <button class="toggle-btn fail" data-val="false">Fail</button>
                    </div>
                    <div class="toggle-group" data-field="pass_asr">
                        <label>ASR (Speech Req):</label>
                        <button class="toggle-btn pass" data-val="true">Pass</button>
                        <button class="toggle-btn fail" data-val="false">Fail</button>
                    </div>
                    <div class="toggle-group" data-field="pass_capsule">
                        <label>Capsule Logic:</label>
                        <button class="toggle-btn pass" data-val="true">Pass</button>
                        <button class="toggle-btn fail" data-val="false">Fail</button>
                    </div>
                    <div class="toggle-group" data-field="pass_tts">
                        <label>TTS (Speech Gen):</label>
                        <button class="toggle-btn pass" data-val="true">Pass</button>
                        <button class="toggle-btn fail" data-val="false">Fail</button>
                    </div>
                    
                    <div>
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Reason / Notes:</label>
                        <textarea id="verify-reason" class="reason-input" placeholder="Enter reason for failure or any additional notes..."></textarea>
                    </div>
                    
                    <div style="margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px;">
                        <span id="save-status" style="color: #aaa; align-self: center; display: none;">Saving...</span>
                        <button id="manual-save-btn" style="background-color: var(--accent-color);">Save Verification</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="verify.js"></script>
</body>
</html>
